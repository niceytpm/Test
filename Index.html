<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>แบบฟอร์มตรวจสอบเครื่องจักรก่อนเริ่มงาน (iPad Version)</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 15px; 
        }
        .container { 
            max-width: 550px; 
            margin: 0 auto; 
            background: #fff; 
            padding: 20px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.08); 
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        /* ปุ่มตั้งค่าเครื่องจักรที่ปรับแก้ไขให้จิ้มง่ายบน iPad */
        .btn-setup {
            background-color: #007aff;
            color: white !important;
            border: none;
            padding: 10px 16px !important;
            border-radius: 8px;
            font-size: 15px !important;
            font-weight: 600;
            cursor: pointer;
            width: auto !important;
            margin-top: 0 !important;
            box-shadow: 0 2px 5px rgba(0, 122, 255, 0.3);
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }
        .btn-setup:active {
            opacity: 0.7;
        }

        h2 { margin: 0; color: #1c1c1e; font-size: 22px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #2c2c2e; font-size: 16px; }
        input[type="text"], input[type="number"] { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #c7c7cc; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 18px;
            background-color: #f2f2f7;
        }
        input:focus { background-color: #fff; outline: 2px solid #007aff; }

        .checklist-item { 
            display: flex; 
            flex-direction: column;
            margin-bottom: 12px; 
            padding: 16px; 
            background: #f9f9f9; 
            border-radius: 10px; 
            border: 1px solid #e5e5ea;
        }
        .check-header { display: flex; align-items: center; }
        
        .checklist-item input[type="checkbox"] { 
            width: 24px;
            height: 24px;
            margin-right: 15px;
            accent-color: #34c759;
            cursor: pointer; 
        }
        .temp-input-box {
            margin-top: 12px;
            margin-left: 39px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .temp-input-box input { width: 180px; padding: 10px 14px; background: #fff; }

        .status-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-size: 15px;
            line-height: 1.5;
        }
        .status-box.error { background-color: #ffe5e5; color: #d70015; border: 1px solid #ffb3b3; }
        .status-box.success { background-color: #e1f8e6; color: #147d36; border: 1px solid #a3e7b4; text-align: center; font-size: 17px; }

        button { 
            width: 100%; 
            padding: 18px; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 18px; 
            font-weight: bold;
            margin-top: 20px; 
            transition: all 0.2s ease;
        }
        button:disabled { background-color: #ff3b30; cursor: not-allowed; opacity: 0.8; }
        button:enabled { background-color: #34c759; cursor: pointer; box-shadow: 0 4px 8px rgba(52, 199, 89, 0.3); }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            width: 85%;
            max-width: 450px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <h2>📋 ตรวจเช็คเครื่องจักร</h2>
            <!-- เปลี่ยนจาก div เป็น button แท้ๆ เพื่อให้รองรับ touch event บน iPad -->
            <button type="button" class="btn-setup" onclick="openSetupModal()">⚙️ ตั้งค่าเครื่อง</button>
        </div>

        <form id="checklistForm">
            <div class="form-group">
                <label>รหัสเครื่องจักร (Machine ID):</label>
                <input type="text" id="machineId" class="input-check" readonly placeholder="แตะปุ่ม '⚙️ ตั้งค่าเครื่อง' ด้านบน">
            </div>
            <div class="form-group">
                <label>รหัสพนักงาน / ผู้ตรวจสอบ:</label>
                <input type="text" id="operatorName" class="input-check" placeholder="แตะเพื่อพิมพ์ชื่อ/รหัส">
            </div>

            <h3 style="color: #1c1c1e; margin-top: 25px; font-size: 18px;">รายการตรวจสอบ</h3>
            
            <div class="checklist-item">
                <div class="check-header">
                    <input type="checkbox" class="input-check" id="checkSensor">
                    <label for="checkSensor" style="margin: 0; font-weight: normal; cursor: pointer; width: 100%;">
                        1. ตรวจสอบแรงกดของเซนเซอร์ (Pressure Normal)
                    </label>
                </div>
            </div>

            <div class="checklist-item">
                <div class="check-header">
                    <input type="checkbox" class="input-check" id="checkTemp">
                    <label for="checkTemp" style="margin: 0; font-weight: normal; cursor: pointer; width: 100%;">
                        2. ตรวจสอบอุณหภูมิฟิกเจอร์ (50 ± 2 °C)
                    </label>
                </div>
                <div class="temp-input-box">
                    <input type="number" id="actualTemp" class="input-check" step="0.1" placeholder="กรอกอุณภูมิจริง">
                    <span style="font-size: 16px; color: #555;">°C</span>
                </div>
            </div>

            <div class="checklist-item">
                <div class="check-header">
                    <input type="checkbox" class="input-check" id="check3">
                    <label for="check3" style="margin: 0; font-weight: normal; cursor: pointer; width: 100%;">
                        3. ฝาครอบ Safety และ Emergency Stop พร้อมใช้งาน
                    </label>
                </div>
            </div>

            <div id="statusBox" class="status-box error"></div>

            <button type="submit" id="submitBtn" disabled>⛔ ไม่อนุญาตให้บันทึก (กรุณาเช็คให้ครบ)</button>
        </form>
    </div>

    <!-- Modal ตั้งค่าสำหรับ iPad -->
    <div id="setupModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color:#1c1c1e;">⚙️ ตั้งค่ารหัสเครื่องจักร</h3>
            <hr style="border: 0; border-top: 1px solid #e5e5ea; margin: 15px 0;">
            
            <div class="form-group">
                <label>รหัสเครื่องจักรประจำ iPad เครื่องนี้:</label>
                <input type="text" id="cfgMachineId" placeholder="เช่น CNC-01 หรือ M-205" style="background:#fff;">
            </div>

            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <button type="button" style="background:#34c759; margin:0; padding:14px;" onclick="saveSystemConfig()">บันทึก</button>
                <button type="button" style="background:#8e8e93; margin:0; padding:14px;" onclick="closeSetupModal()">ยกเลิก</button>
            </div>
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll('.input-check');
        const submitBtn = document.getElementById('submitBtn');
        const statusBox = document.getElementById('statusBox');
        const setupModal = document.getElementById('setupModal');

        window.addEventListener('DOMContentLoaded', () => {
            const savedMachineId = localStorage.getItem('cfg_machine_id');
            if (savedMachineId) {
                document.getElementById('machineId').value = savedMachineId;
                document.getElementById('cfgMachineId').value = savedMachineId;
            }
            validateChecklist();
        });

        function openSetupModal() { 
            setupModal.style.display = 'flex'; 
        }
        function closeSetupModal() { 
            setupModal.style.display = 'none'; 
        }

        function saveSystemConfig() {
            const cfgMachineId = document.getElementById('cfgMachineId').value.trim();
            if (!cfgMachineId) {
                alert('กรุณากรอกรหัสเครื่องจักร');
                return;
            }
            localStorage.setItem('cfg_machine_id', cfgMachineId);
            document.getElementById('machineId').value = cfgMachineId;
            alert('บันทึกรหัสเครื่องจักรเรียบร้อย!');
            closeSetupModal();
            validateChecklist();
        }

        function validateChecklist() {
            const machineId = document.getElementById('machineId').value.trim();
            const operatorName = document.getElementById('operatorName').value.trim();
            const checkSensor = document.getElementById('checkSensor').checked;
            const checkTemp = document.getElementById('checkTemp').checked;
            const check3 = document.getElementById('check3').checked;
            const actualTempInput = document.getElementById('actualTemp').value;
            const actualTemp = parseFloat(actualTempInput);

            let errors = [];

            if (!machineId) errors.push("ยังไม่ได้ตั้งรหัสเครื่อง (แตะปุ่ม '⚙️ ตั้งค่าเครื่อง')");
            if (!operatorName) errors.push("ยังไม่ได้กรอกรหัสผู้ตรวจสอบ");
            if (!checkSensor) errors.push("ยังไม่ได้เช็คแรงกดเซนเซอร์");
            if (!checkTemp) errors.push("ยังไม่ได้เช็คอุณหภูมิฟิกเจอร์");
            
            if (checkTemp) {
                if (actualTempInput === "") {
                    errors.push("กรุณากรอกตัวเลขอุณหภูมิจริง");
                } else if (isNaN(actualTemp) || actualTemp < 48.0 || actualTemp > 52.0) {
                    errors.push(`อุณหภูมิฟิกเจอร์อยู่นอกเกณฑ์! (${actualTempInput} °C / ต้องอยู่ระหว่าง 48.0 - 52.0 °C)`);
                }
            }

            if (!check3) errors.push("ยังไม่ได้เช็คระบบความปลอดภัย");

            if (errors.length === 0) {
                submitBtn.disabled = false;
                submitBtn.innerText = "✅ ผ่านการตรวจสอบ - กดบันทึก Log";
                statusBox.className = "status-box success";
                statusBox.innerHTML = "<b>🟢 พร้อมบันทึกข้อมูลเรียบร้อยครับ</b>";
            } else {
                submitBtn.disabled = true;
                submitBtn.innerText = "⛔ ไม่อนุญาตให้บันทึก (กรุณาเช็คให้ครบ)";
                statusBox.className = "status-box error";
                statusBox.innerHTML = "<b>❌ รายการที่ยังไม่ผ่าน:</b><br>" + errors.map(err => `• ${err}`).join('<br>');
            }
        }

        inputs.forEach(input => {
            input.addEventListener('input', validateChecklist);
            input.addEventListener('change', validateChecklist);
        });

        document.getElementById('checklistForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const machineId = document.getElementById('machineId').value;
            const operatorName = document.getElementById('operatorName').value;
            const temp = document.getElementById('actualTemp').value;
            const now = new Date();
            const timeStr = now.toLocaleString('th-TH');
            const dateFileName = now.toISOString().split('T')[0];

            const csvHeader = "Timestamp,Machine_ID,Operator,Temp_C,Status\n";
            const csvRow = `"${timeStr}","${machineId}","${operatorName}","${temp}","PASS"\n`;
            const blobContent = csvHeader + csvRow;

            const blob = new Blob(["\ufeff" + blobContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const downloadLink = document.createElement("a");
            
            downloadLink.href = url;
            downloadLink.download = `log_${machineId}_${dateFileName}.csv`;
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);

            alert(`🎉 บันทึกสำเร็จ! ไฟล์ Log ถูกเซฟลงในแอป Files (Downloads) เรียบร้อยครับ`);

            document.getElementById('operatorName').value = '';
            document.getElementById('actualTemp').value = '';
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            validateChecklist();
        });
    </script>
</body>
</html>
