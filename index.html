<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แบบฟอร์มตรวจสอบเครื่องจักรก่อนเริ่มงาน (PC Version)</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f6; 
            margin: 0; 
            padding: 20px; 
        }
        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            background: #fff; 
            padding: 25px 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #eaeded;
        }
        h2 { margin: 0; color: #2c3e50; font-size: 22px; }
        
        .btn-setup-main {
            background-color: #2980b9;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 2px 4px rgba(41, 128, 185, 0.3);
            transition: background 0.2s;
        }
        .btn-setup-main:hover {
            background-color: #1f618d;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; }
        input[type="text"], input[type="number"] { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-size: 16px;
        }
        input:read-only { background-color: #eaeded; color: #555; }

        .checklist-item { 
            display: flex; 
            flex-direction: column;
            margin-bottom: 12px; 
            padding: 15px; 
            background: #f9f9f9; 
            border-radius: 6px; 
            border: 1px solid #e0e0e0;
        }
        .check-header { display: flex; align-items: center; }
        .checklist-item input[type="checkbox"] { 
            transform: scale(1.8); 
            margin-right: 20px; 
            margin-left: 10px;
            cursor: pointer; 
        }

        /* กล่องกรอกอุณหภูมิ (ซ่อนไว้เป็นค่าเริ่มต้น) */
        .temp-input-box {
            margin-top: 12px;
            margin-left: 48px;
            display: none; /* ซ่อนไว้ก่อน จะแสดงเมื่อกดติ๊กถูก */
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.3s ease-in-out;
        }
        .temp-input-box input { width: 180px; padding: 10px 12px; border: 2px solid #2980b9; border-radius: 4px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .path-info-box {
            background-color: #eef9ff;
            border: 1px solid #bce1f7;
            padding: 12px 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13.5px;
            color: #1c5276;
            line-height: 1.6;
        }

        .status-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            font-size: 15px;
            line-height: 1.6;
        }
        .status-box.error { background-color: #fce8e6; color: #c5221f; border: 1px solid #f5c6cb; }
        .status-box.success { background-color: #e6f4ea; color: #137333; border: 1px solid #ceead6; text-align: center; font-size: 16px; }

        button[type="submit"] { 
            width: 100%; 
            padding: 16px; 
            color: white; 
            border: none; 
            border-radius: 6px; 
            font-size: 18px; 
            font-weight: bold;
            margin-top: 20px; 
            transition: all 0.3s ease;
        }
        button[type="submit"]:disabled { background-color: #ea4335; cursor: not-allowed; opacity: 0.85; }
        button[type="submit"]:enabled { background-color: #34a853; cursor: pointer; box-shadow: 0 4px 6px rgba(52, 168, 83, 0.3); }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .btn-folder {
            background-color: #34495e;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 5px;
        }
        .btn-folder:hover { background-color: #2c3e50; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-bar">
            <h2>📋 ตรวจสอบเครื่องจักร</h2>
            <button type="button" class="btn-setup-main" onclick="openSetupModal()">⚙️ ตั้งค่าระบบ Log / โฟลเดอร์</button>
        </div>

        <div class="path-info-box" id="pathDisplay">
            📌 <b>การตั้งค่าปัจจุบัน:</b><br>
            • รหัสเครื่องจักร: <span id="dispMachineId" style="font-weight:bold; color:#c5221f;">ยังไม่ได้ตั้งค่า</span><br>
            • ปลายทางโฟลเดอร์ Log: <span id="dispFolderPath" style="font-weight:bold; color:#c5221f;">ยังไม่ได้เลือกโฟลเดอร์</span>
        </div>

        <form id="checklistForm">
            <div class="form-group">
                <label>รหัสเครื่องจักร (Machine ID):</label>
                <input type="text" id="machineId" class="input-check" readonly placeholder="กดปุ่ม '⚙️ ตั้งค่าระบบ Log / โฟลเดอร์' ด้านบนเพื่อกำหนดรหัส">
            </div>
            <div class="form-group">
                <label>รหัสพนักงาน/ผู้ตรวจสอบ:</label>
                <input type="text" id="operatorName" class="input-check" placeholder="ระบุชื่อ หรือ รหัสพนักงาน">
            </div>

            <h3 style="color: #2c3e50; margin-top: 25px;">รายการตรวจสอบ</h3>
            
            <div class="checklist-item">
                <div class="check-header">
                    <input type="checkbox" class="input-check" id="checkSensor">
                    <label for="checkSensor" style="margin: 0; font-weight: normal; cursor: pointer; width: 100%;">
                        1. ตรวจสอบแรงกดของเซนเซอร์ (Sensor Pressure Normal)
                    </label>
                </div>
            </div>

            <div class="checklist-item">
                <div class="check-header">
                    <input type="checkbox" class="input-check" id="checkTemp">
                    <label for="checkTemp" style="margin: 0; font-weight: normal; cursor: pointer; width: 100%;">
                        2. ตรวจสอบอุณหภูมิฟิกเจอร์ (ค่ามาตรฐาน 50 ± 2 °C)
                    </label>
                </div>
                <!-- ช่องกรอกอุณหภูมิจะแสดงขึ้นมาเมื่อกดติ๊กถูกด้านบน -->
                <div class="temp-input-box" id="tempInputBox">
                    <label for="actualTemp" style="margin:0; font-size:14px; font-weight:normal;">กรอกอุณภูมิจริง:</label>
                    <input type="number" id="actualTemp" class="input-check" step="0.1" placeholder="ระบุตัวเลข (48-52)">
                    <span style="font-size: 14px; color: #555; font-weight: bold;">°C</span>
                </div>
            </div>

            <div class="checklist-item">
                <div class="check-header">
                    <input type="checkbox" class="input-check" id="check3">
                    <label for="check3" style="margin: 0; font-weight: normal; cursor: pointer; width: 100%;">
                        3. ฝาครอบความปลอดภัย (Safety Guard) และปุ่มหยุดฉุกเฉินพร้อมใช้งาน
                    </label>
                </div>
            </div>

            <div id="statusBox" class="status-box error"></div>

            <button type="submit" id="submitBtn" disabled>⛔ ไม่อนุญาตให้บันทึก (กรุณาเช็คให้ครบ)</button>
        </form>
    </div>

    <!-- Modal ตั้งค่าระบบ -->
    <div id="setupModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color:#2c3e50;">⚙️ ตั้งค่าตำแหน่งบันทึกไฟล์ Log</h3>
            <p style="font-size: 13px; color: #666;">กำหนดเลขเครื่องและโฟลเดอร์หลัก ระบบจะสร้างโฟลเดอร์ย่อยตามเลขเครื่องให้อัตโนมัติ</p>
            <hr>
            
            <div class="form-group" style="margin-top: 15px;">
                <label>1. ระบุหมายเลขเครื่องจักร (Machine ID):</label>
                <input type="text" id="cfgMachineId" placeholder="เช่น CNC-01 หรือ M-102">
            </div>

            <div class="form-group">
                <label>2. เลือกโฟลเดอร์หลักสำหรับเซฟ Log:</label>
                <button type="button" class="btn-folder" onclick="selectParentFolder()">📁 กดเพื่อเลือกโฟลเดอร์ในคอมพิวเตอร์</button>
                <div id="folderSelectedName" style="margin-top:8px; font-size:13px; color:#27ae60; font-weight:bold;"></div>
            </div>

            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <button type="button" style="background:#27ae60; color:white; border:none; padding:12px; border-radius:4px; flex:1; font-weight:bold; cursor:pointer;" onclick="saveSystemConfig()">บันทึกการตั้งค่า</button>
                <button type="button" style="background:#7f8c8d; color:white; border:none; padding:12px; border-radius:4px; flex:1; font-weight:bold; cursor:pointer;" onclick="closeSetupModal()">ปิดหน้าต่างนี้</button>
            </div>
        </div>
    </div>

    <script>
        let mainDirectoryHandle = null;
        const inputs = document.querySelectorAll('.input-check');
        const submitBtn = document.getElementById('submitBtn');
        const statusBox = document.getElementById('statusBox');
        const setupModal = document.getElementById('setupModal');
        
        const checkTemp = document.getElementById('checkTemp');
        const tempInputBox = document.getElementById('tempInputBox');
        const actualTempInput = document.getElementById('actualTemp');

        function openSetupModal() { setupModal.style.display = 'flex'; }
        function closeSetupModal() { setupModal.style.display = 'none'; }

        // ดักจับการติ๊กถูกที่ช่องอุณหภูมิ เพื่อแสดง/ซ่อน ช่องกรอกตัวเลข
        checkTemp.addEventListener('change', function() {
            if (this.checked) {
                tempInputBox.style.display = 'flex';
                actualTempInput.focus(); // โฟกัสเคอร์เซอร์ไปที่ช่องกรอกทันที
            } else {
                tempInputBox.style.display = 'none';
                actualTempInput.value = ''; // ล้างค่าตัวเลขเมื่อเลิกติ๊ก
            }
            validateChecklist();
        });

        window.addEventListener('DOMContentLoaded', () => {
            const savedMachineId = localStorage.getItem('pc_cfg_machine_id');
            if (savedMachineId) {
                document.getElementById('machineId').value = savedMachineId;
                document.getElementById('cfgMachineId').value = savedMachineId;
                document.getElementById('dispMachineId').innerText = savedMachineId;
                document.getElementById('dispMachineId').style.color = "#27ae60";
            }
            validateChecklist();
        });

        async function selectParentFolder() {
            try {
                mainDirectoryHandle = await window.showDirectoryPicker();
                document.getElementById('folderSelectedName').innerText = `เลือกโฟลเดอร์: ${mainDirectoryHandle.name}`;
            } catch (err) {
                if (err.name !== 'AbortError') {
                    alert('เกิดข้อผิดพลาดในการเลือกโฟลเดอร์ หรือเบราว์เซอร์ไม่รองรับ');
                }
            }
        }

        function saveSystemConfig() {
            const cfgMachineId = document.getElementById('cfgMachineId').value.trim();
            
            if (!cfgMachineId) {
                alert('กรุณากรอกรหัสเครื่องจักร');
                return;
            }

            if (!mainDirectoryHandle) {
                alert('กรุณากดเลือกโฟลเดอร์สำหรับเก็บไฟล์ Log ก่อนครับ');
                return;
            }

            localStorage.setItem('pc_cfg_machine_id', cfgMachineId);
            document.getElementById('machineId').value = cfgMachineId;

            document.getElementById('dispMachineId').innerText = cfgMachineId;
            document.getElementById('dispMachineId').style.color = "#27ae60";
            
            document.getElementById('dispFolderPath').innerText = `${mainDirectoryHandle.name} / ${cfgMachineId} /`;
            document.getElementById('dispFolderPath').style.color = "#27ae60";

            alert('บันทึกการตั้งค่าระบบเรียบร้อย!');
            closeSetupModal();
            validateChecklist();
        }

        function validateChecklist() {
            const machineId = document.getElementById('machineId').value.trim();
            const operatorName = document.getElementById('operatorName').value.trim();
            const checkSensor = document.getElementById('checkSensor').checked;
            const check3 = document.getElementById('check3').checked;
            const actualTempVal = actualTempInput.value;
            const actualTemp = parseFloat(actualTempVal);

            let errors = [];

            if (!machineId) errors.push("ยังไม่ได้ตั้งค่าหมายเลขเครื่องจักร");
            if (!mainDirectoryHandle) errors.push("ยังไม่ได้เลือกโฟลเดอร์บันทึก Log");
            if (!operatorName) errors.push("ยังไม่ได้กรอกรหัสผู้ตรวจสอบ");
            if (!checkSensor) errors.push("ยังไม่ได้ติ๊กเช็คแรงกดของเซนเซอร์");
            
            // ตรวจสอบอุณหภูมิเมื่อมีการติ๊กถูก
            if (!checkTemp.checked) {
                errors.push("ยังไม่ได้ติ๊กเช็คอุณหภูมิฟิกเจอร์");
            } else {
                if (actualTempVal === "") {
                    errors.push("กรุณากรอกตัวเลขอุณหภูมิจริงของฟิกเจอร์");
                } else if (isNaN(actualTemp) || actualTemp < 48.0 || actualTemp > 52.0) {
                    errors.push(`อุณหภูมิฟิกเจอร์อยู่นอกเกณฑ์! (${actualTempVal} °C / เกณฑ์คือ 48.0 - 52.0 °C)`);
                }
            }

            if (!check3) errors.push("ยังไม่ได้ติ๊กเช็คระบบความปลอดภัย");

            if (errors.length === 0) {
                submitBtn.disabled = false;
                submitBtn.innerText = "✅ ผ่านการตรวจสอบ - กดเพื่อบันทึกงาน";
                statusBox.className = "status-box success";
                statusBox.innerHTML = "<b>🟢 ทุกรายการถูกต้องสมบูรณ์ พร้อมบันทึกข้อมูลแล้วครับ</b>";
            } else {
                submitBtn.disabled = true;
                submitBtn.innerText = "⛔ ไม่อนุญาตให้บันทึก (กรุณาตรวจสอบ)";
                statusBox.className = "status-box error";
                statusBox.innerHTML = "<b>❌ รายการที่ยังไม่ผ่าน:</b><br>" + errors.map(err => `• ${err}`).join('<br>');
            }
        }

        inputs.forEach(input => {
            input.addEventListener('input', validateChecklist);
            input.addEventListener('change', validateChecklist);
        });

        document.getElementById('checklistForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            if (!mainDirectoryHandle) {
                alert('⚠️ กรุณากดตั้งค่าและเลือกโฟลเดอร์ก่อนบันทึกครับ');
                openSetupModal();
                return;
            }

            const machineId = document.getElementById('machineId').value;
            const operatorName = document.getElementById('operatorName').value;
            const temp = actualTempInput.value;
            const now = new Date();
            const timeStr = now.toLocaleString('th-TH');
            const dateFileName = now.toISOString().split('T')[0];

            const logLine = `"${timeStr}","${machineId}","${operatorName}","${temp}","PASS"\n`;

            try {
                const machineFolderHandle = await mainDirectoryHandle.getDirectoryHandle(machineId, { create: true });
                const fileName = `log_${machineId}_${dateFileName}.csv`;
                const fileHandle = await machineFolderHandle.getFileHandle(fileName, { create: true });
                
                const file = await fileHandle.getFile();
                const existingText = await file.text();
                
                let contentToWrite = existingText;
                if (existingText.length === 0) {
                    contentToWrite = "Timestamp,Machine_ID,Operator,Temp_C,Status\n";
                }
                contentToWrite += logLine;

                const writable = await fileHandle.createWritable();
                await writable.write(contentToWrite);
                await writable.close();

                alert(`🎉 บันทึก Log สำเร็จ!\nจัดเก็บที่: ${mainDirectoryHandle.name} / ${machineId} / ${fileName}`);
                
                // เคลียร์ข้อมูลฟอร์ม และซ่อนช่องอุณหภูมิกลับไป
                document.getElementById('operatorName').value = '';
                actualTempInput.value = '';
                tempInputBox.style.display = 'none';
                document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                validateChecklist();

            } catch (err) {
                console.error(err);
                alert('เกิดข้อผิดพลาดในการเขียนไฟล์ลงดิสก์');
            }
        });
    </script>
</body>
</html>
